services:
  backend:
    build: ./backend
    container_name: nexus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=db
    networks:
      - nexus-network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: nexus_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - nexus-network
    depends_on:
      - backend

networks:
  nexus-network:
    external: true # สำคัญมาก: บอกว่าให้ไปใช้ Network ที่ถูกสร้างไว้แล้วจากไฟล์ DB